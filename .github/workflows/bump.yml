name: bump formula

# Keeps Formula/reevesagents.rb in sync with the latest reevesagents release on
# npm. Runs daily and can be triggered by hand from the Actions tab (run it after
# a release, or to recover if the daily schedule was paused after 60 days of repo
# inactivity). No cross-repo token: it writes to this repo with the built-in
# GITHUB_TOKEN. The bump only lands if the new formula actually installs and its
# test passes, so a broken upstream never ships.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Homebrew/actions/setup-homebrew@main

      - name: Bump to the latest npm version and verify it installs
        run: |
          set -euo pipefail
          formula="Formula/reevesagents.rb"
          latest="$(npm view reevesagents version)"
          current="$(sed -nE 's#.*reevesagents-([0-9][0-9.]*)\.tgz.*#\1#p' "$formula" | head -1)"
          echo "current=$current latest=$latest"
          if [ "$latest" = "$current" ]; then
            echo "Formula already on $latest."
            exit 0
          fi
          url="https://registry.npmjs.org/reevesagents/-/reevesagents-${latest}.tgz"
          curl -fsSL "$url" -o pkg.tgz
          sha="$(sha256sum pkg.tgz | cut -d' ' -f1)"
          rm -f pkg.tgz
          sed -i -E "s#url \"[^\"]*reevesagents-[0-9][0-9.]*\.tgz\"#url \"${url}\"#" "$formula"
          sed -i -E "s/sha256 \"[0-9a-f]{64}\"/sha256 \"${sha}\"/" "$formula"

          # Only ship the bump if the new formula actually installs and runs.
          # setup-homebrew symlinks this checkout in as the tap, so installing by
          # tap name picks up the freshly bumped formula; a bare path is rejected.
          brew install --build-from-source mertkayacs/reevesagents/reevesagents
          brew test mertkayacs/reevesagents/reevesagents

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$formula"
          git commit -m "reevesagents ${latest}"
          git push
